name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: masterhttprelay-linux-amd64
          - os: macos-14
            artifact: masterhttprelay-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --clean \
            --strip \
            --name masterhttprelay \
            --hidden-import=cryptography \
            --hidden-import=h2 \
            --hidden-import=hpack \
            --hidden-import=hyperframe \
            main.py

      - name: Rename artifact
        run: mv dist/masterhttprelay dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release-latest:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Rolling build from the latest commit on `main`.
            Commit: ${{ github.sha }}
          prerelease: true
          make_latest: "true"
          files: dist/*

  release-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
